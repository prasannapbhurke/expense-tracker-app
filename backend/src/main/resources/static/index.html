<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker Dashboard</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .summary-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary { border-radius: 25px; padding: 10px 25px; font-weight: bold; }
        .table thead th { border-top: none; }
        .logout-btn { position: absolute; right: 20px; top: 20px; }
        .search-container { position: relative; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #aaa; }
        #search-input { padding-left: 40px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <form action="/logout" method="post" class="logout-btn">
            <button type="submit" class="btn btn-outline-danger btn-sm"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </form>

        <h1 class="mb-4">My Dashboard</h1>

        <div class="row">
            <div class="col-md-4">
                <div class="card summary-card p-4 h-100">
                    <h5>Total Spent</h5>
                    <h1 id="total-spent">Rs 0.00</h1>
                    <p class="mb-0 mt-auto"><i class="fas fa-calendar-alt"></i> Overview</p>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-4 h-100">
                    <h5>Spending by Category</h5>
                    <div id="category-summary" class="mt-3"></div>
                </div>
            </div>
        </div>

        <div class="card p-4 mt-3">
            <div class="row mb-4 align-items-center">
                <div class="col-md-3">
                    <h4 class="mb-0">Expenses</h4>
                </div>
                <div class="col-md-3">
                    <div class="search-container">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" class="form-control" placeholder="Search...">
                    </div>
                </div>
                <div class="col-md-6 text-right">
                    <select class="form-control d-inline-block mr-2" id="time-range" style="width: auto;">
                        <option value="">All Time</option>
                        <option value="daily">Today</option>
                        <option value="2days">Past 2 Days</option>
                        <option value="3days">Past 3 Days</option>
                        <option value="weekly">This Week</option>
                        <option value="monthly">This Month</option>
                        <option value="yearly">This Year</option>
                    </select>
                    <select class="form-control d-inline-block mr-2" id="sort-by" style="width: auto;">
                        <option value="timestamp,desc">Newest First</option>
                        <option value="amount,desc">Highest</option>
                        <option value="amount,asc">Lowest</option>
                    </select>
                    <button class="btn btn-primary" data-toggle="modal" data-target="#addExpenseModal">
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>
            </div>

            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Expense Details</th>
                        <th>Amount</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="expense-list"></tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="addExpenseModal" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content" style="border-radius: 20px;">
                <div class="modal-header">
                    <h5 class="modal-title" id="addExpenseModalLabel">Add Expense</h5>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body p-4">
                    <form id="add-expense-form">
                        <input type="hidden" id="expense-id">
                        <div class="form-group">
                            <label>Expense Name</label>
                            <input type="text" class="form-control" id="expense-name" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>Amount (Rs)</label>
                                <input type="number" step="0.01" class="form-control" id="expense-amount" required>
                            </div>
                            <div class="form-group col-md-6">
                                <label>Category</label>
                                <select class="form-control" id="expense-category">
                                    <option value="Food">Food</option>
                                    <option value="Transport">Transport</option>
                                    <option value="Shopping">Shopping</option>
                                    <option value="Bills">Bills</option>
                                    <option value="Other" selected>Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" class="form-control" id="expense-date" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="save-expense">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
